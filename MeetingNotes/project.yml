name: MeetingNotes
options:
  bundleIdPrefix: com.meetingnotes
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
targets:
  MeetingNotes:
    type: application
    # Single multiplatform target (iPhone, iPad, Mac) — not separate _iOS / _macOS targets
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: MeetingNotes
        excludes: ["*.xcassets"]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.meetingnotes.app
      GENERATE_INFOPLIST_FILE: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "Meeting Notes needs microphone access to record meetings."
      INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Meeting Notes sends recordings to your Mac mini for transcription."
    info:
      path: MeetingNotes/Info.plist
      properties:
        UIBackgroundModes: [audio]
